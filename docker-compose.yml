services:
  db:
    image: postgres:16-alpine
    container_name: plato-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: plato
      POSTGRES_PASSWORD: plato
      POSTGRES_DB: plato
    ports:
      - "5433:5432"
    volumes:
      - plato-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plato -d plato"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  plato-pgdata:
